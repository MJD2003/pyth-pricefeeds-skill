<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pyth Live Price Dashboard</title>
  <style>
    :root {
      --bg: #0a0e17;
      --card: #131a2a;
      --border: #1e2a3e;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --accent: #8b5cf6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .header h1 span { color: var(--accent); }

    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
    }

    .status-dot.connected { background: var(--green); animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .controls {
      padding: 1rem 2rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .controls input {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      flex: 1;
      min-width: 200px;
    }

    .controls button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .controls button:hover { opacity: 0.9; }
    .controls button.secondary { background: var(--border); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      padding: 1rem 2rem 2rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      transition: border-color 0.2s;
    }

    .card.flash-green { border-color: var(--green); }
    .card.flash-red { border-color: var(--red); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .symbol {
      font-weight: 600;
      font-size: 1rem;
    }

    .asset-type {
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      background: var(--border);
      color: var(--muted);
      text-transform: uppercase;
    }

    .price {
      font-size: 1.75rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      margin-bottom: 0.5rem;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .conf { color: var(--blue); }
    .change.positive { color: var(--green); }
    .change.negative { color: var(--red); }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }

    .footer {
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>Pyth</span> Live Price Dashboard</h1>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
      <span id="updateCount" style="margin-left: 1rem;"></span>
    </div>
  </div>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search feeds (e.g., BTC, ETH, AAPL)..." />
    <button onclick="searchAndAdd()">Add Feed</button>
    <button class="secondary" onclick="addDefaults()">Load Defaults</button>
    <button class="secondary" onclick="clearAll()">Clear All</button>
  </div>

  <div class="grid" id="grid">
    <div class="empty" id="emptyState">
      Search for a price feed above or click "Load Defaults" to start streaming live prices.
    </div>
  </div>

  <div class="footer">
    Data from <a href="https://hermes.pyth.network" style="color: var(--accent);">Pyth Hermes</a> via SSE.
    Feed catalog: <a href="https://hermes.pyth.network/v2/price_feeds" style="color: var(--accent);">hermes.pyth.network/v2/price_feeds</a>
  </div>

  <script>
    const HERMES = "https://hermes.pyth.network";
    let feeds = {};       // feedId -> { symbol, assetType, price, conf, expo, prevPrice }
    let eventSource = null;
    let updateCounter = 0;

    // ─── Default Feeds ─────────────────────────────
    const DEFAULTS = [
      { id: "e62df6c8b4a85fe1a67db44dc12de5db330f7ac66b72dc658afedf0f4a415b43", symbol: "Crypto.BTC/USD", type: "crypto" },
      { id: "ff61491a931112ddf1bd8147cd1b641375f79f5825126d665480874634fd0ace", symbol: "Crypto.ETH/USD", type: "crypto" },
      { id: "ef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d", symbol: "Crypto.SOL/USD", type: "crypto" },
      { id: "eaa020c61cc479712813461ce153894a96a6c00b21ed0cfc2798d1f9a9e9c94a", symbol: "Crypto.USDC/USD", type: "crypto" },
      { id: "765d2ba906dbc32ca17cc11f5310a89e9ee1f6420508c63861f2f8ba4ee34bb2", symbol: "Equity.US.AAPL/USD", type: "equity" },
      { id: "b00b60f88b03a6a625a8d1c048c3f66653edf217439cb7b1ac8c58dba0e8954c", symbol: "Equity.US.TSLA/USD", type: "equity" },
      { id: "a995d00bb36a63cef7fd2c287dc105fc8f3d93779f062f09551b0af3e81ec30b", symbol: "FX.EUR/USD", type: "fx" },
      { id: "2b89b9dc8fdf9f34709a5b106b472f0f39bb6ca9ce04b0fd7f2e971688e2e53b", symbol: "Metal.XAU/USD", type: "metal" },
    ];

    // ─── Search & Add ──────────────────────────────
    async function searchAndAdd() {
      const query = document.getElementById("searchInput").value.trim();
      if (!query) return;

      try {
        const res = await fetch(`${HERMES}/v2/price_feeds?query=${encodeURIComponent(query)}`);
        const results = await res.json();

        if (results.length === 0) {
          alert(`No feeds found for "${query}"`);
          return;
        }

        // Add first 5 matches
        const toAdd = results.slice(0, 5);
        for (const feed of toAdd) {
          addFeed(feed.id, feed.attributes.symbol, feed.attributes.asset_type);
        }

        reconnectSSE();
        document.getElementById("searchInput").value = "";
      } catch (err) {
        alert("Error searching: " + err.message);
      }
    }

    function addDefaults() {
      for (const d of DEFAULTS) {
        addFeed(d.id, d.symbol, d.type);
      }
      reconnectSSE();
    }

    function addFeed(id, symbol, assetType) {
      if (feeds[id]) return; // Already tracking

      feeds[id] = { symbol, assetType, price: 0, conf: 0, expo: 0, prevPrice: 0 };

      // Remove empty state
      document.getElementById("emptyState")?.remove();

      // Create card
      const card = document.createElement("div");
      card.className = "card";
      card.id = `card-${id}`;
      card.innerHTML = `
        <div class="card-header">
          <span class="symbol">${symbol.replace("Crypto.", "").replace("Equity.US.", "").replace("FX.", "").replace("Metal.", "")}</span>
          <span class="asset-type">${assetType}</span>
        </div>
        <div class="price" id="price-${id}">—</div>
        <div class="meta">
          <span class="conf" id="conf-${id}">±—</span>
          <span class="change" id="change-${id}"></span>
        </div>
      `;
      document.getElementById("grid").appendChild(card);
    }

    function clearAll() {
      feeds = {};
      document.getElementById("grid").innerHTML =
        '<div class="empty" id="emptyState">Search for a price feed above or click "Load Defaults" to start streaming live prices.</div>';
      if (eventSource) { eventSource.close(); eventSource = null; }
      setStatus(false);
    }

    // ─── SSE Streaming ─────────────────────────────
    function reconnectSSE() {
      if (eventSource) eventSource.close();

      const ids = Object.keys(feeds);
      if (ids.length === 0) return;

      const params = ids.map(id => `ids[]=${id}`).join("&");
      const url = `${HERMES}/v2/updates/price/stream?${params}&parsed=true&allow_unordered=true&benchmarks_only=false`;

      eventSource = new EventSource(url);

      eventSource.onopen = () => setStatus(true);
      eventSource.onerror = () => setStatus(false);

      eventSource.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.parsed) {
            for (const item of data.parsed) {
              updatePrice(item.id, item.price);
            }
          }
          updateCounter++;
          document.getElementById("updateCount").textContent = `${updateCounter} updates`;
        } catch {}
      };
    }

    function updatePrice(id, priceData) {
      const feed = feeds[id];
      if (!feed) return;

      const rawPrice = Number(priceData.price);
      const conf = Number(priceData.conf);
      const expo = Number(priceData.expo);
      const realPrice = rawPrice * Math.pow(10, expo);
      const realConf = conf * Math.pow(10, expo);

      feed.prevPrice = feed.price || realPrice;
      feed.price = realPrice;
      feed.conf = realConf;
      feed.expo = expo;

      // Update DOM
      const priceEl = document.getElementById(`price-${id}`);
      const confEl = document.getElementById(`conf-${id}`);
      const changeEl = document.getElementById(`change-${id}`);
      const card = document.getElementById(`card-${id}`);

      if (priceEl) priceEl.textContent = formatPrice(realPrice);
      if (confEl) confEl.textContent = `\u00b1${formatPrice(realConf)}`;

      // Flash card on price change
      if (card) {
        card.classList.remove("flash-green", "flash-red");
        if (realPrice > feed.prevPrice) card.classList.add("flash-green");
        else if (realPrice < feed.prevPrice) card.classList.add("flash-red");
        setTimeout(() => card.classList.remove("flash-green", "flash-red"), 500);
      }
    }

    function formatPrice(p) {
      if (Math.abs(p) >= 1000) return "$" + p.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (Math.abs(p) >= 1) return "$" + p.toFixed(4);
      if (Math.abs(p) >= 0.01) return "$" + p.toFixed(6);
      return "$" + p.toFixed(8);
    }

    function setStatus(connected) {
      document.getElementById("statusDot").className = "status-dot" + (connected ? " connected" : "");
      document.getElementById("statusText").textContent = connected ? "Streaming" : "Disconnected";
    }

    // Enter key support
    document.getElementById("searchInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") searchAndAdd();
    });
  </script>
</body>
</html>
